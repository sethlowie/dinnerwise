apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-lgtm
  labels:
    app: otel-lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-lgtm
  template:
    metadata:
      labels:
        app: otel-lgtm
    spec:
      containers:
        - name: otel-lgtm
          image: grafana/otel-lgtm:0.28.0
          ports:
            - { name: grafana, containerPort: 3000 }
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          # Provision our dashboard via subPath file mounts so we add files
          # without hiding otel-lgtm's built-in provisioning directory.
          volumeMounts:
            - name: dashboard
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/dinnerwise.json
              subPath: dashboard.json
            - name: provider
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/dinnerwise.yaml
              subPath: provisioning.yaml
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: dashboard
          configMap:
            name: grafana-dashboard
        - name: provider
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: otel-lgtm
spec:
  selector:
    app: otel-lgtm
  ports:
    - { name: grafana, port: 3000, targetPort: 3000 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
