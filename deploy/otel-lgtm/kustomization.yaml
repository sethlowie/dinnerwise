apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dinnerwise-obs
resources:
  - namespace.yaml
  - deployment.yaml
configMapGenerator:
  - name: grafana-dashboard
    files:
      - dashboard.json
  - name: grafana-provisioning
    files:
      - provisioning.yaml
generatorOptions:
  disableNameSuffixHash: true
