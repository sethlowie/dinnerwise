syntax = "proto3";

package internal.agent.v1;

// HistoryTurn is one prior exchange in the conversation: what the user said and
// the assistant's final spoken reply. Tool calls/results are intentionally not
// carried — just the gist — to keep the resent context small.
message HistoryTurn {
  string user_text = 1;
  string assistant_text = 2;
}

message AskRequest {
  string text = 1;
  // Prior turns, oldest first. The server is stateless, so the client sends the
  // conversation history each turn.
  repeated HistoryTurn history = 2;
}

message TextDelta { string text = 1; }
message Thinking { string text = 1; }
message ToolCall {
  string name = 1;
  string detail = 2;
}
message Navigate {
  string to = 1;
  map<string, string> search = 2;
}
message Done {}

message Reference {
  string kind = 1;
  string id = 2;
  string title = 3;
  string subtitle = 4;
}

message AskEvent {
  oneof event {
    TextDelta text = 1;
    Thinking thinking = 2;
    ToolCall tool_call = 3;
    Navigate navigate = 4;
    Done done = 5;
    Reference reference = 6;
  }
}

service AgentService {
  rpc Ask(AskRequest) returns (stream AskEvent);
}
